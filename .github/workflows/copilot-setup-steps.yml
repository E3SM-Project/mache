name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pixi.toml
      - pyproject.toml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pixi.toml
      - pyproject.toml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.62.2
          cache: ${{ hashFiles('pixi.lock') != '' }}
          environments: py314

      - name: Install mache in the Pixi environment
        run: |
          pixi run -e py314 python -m pip install --no-deps \
            --no-build-isolation -e .

      - name: Verify the agent environment
        run: |
          pixi run -e py314 python --version
          pixi run -e py314 pytest --version
          pixi run -e py314 pre-commit --version
          pixi run -e py314 mache --help
