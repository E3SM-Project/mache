# Options related to deploying an e3sm-unified conda environment on supported
# machines
[e3sm_unified]

# the unix group for permissions for the e3sm-unified conda environment
group = cli115

# the compiler set to use for system libraries
compiler = craygnu

# the system MPI library
mpi = mpich

# the path to the directory where activation scripts, the base environment, and
# system libraries will be deployed
base_path = /ccs/proj/cli115/software/e3sm-unified

# whether to use E3SM modules for hdf5, netcdf-c, netcdf-fortran and pnetcdf
# (spack modules are used otherwise)
use_e3sm_hdf5_netcdf = True


# config options related to data needed by diagnostics software such as
# e3sm_diags and MPAS-Analysis
[diagnostics]

# The base path to the diagnostics directory
base_path = /lustre/orion/cli115/world-shared/diagnostics

# the unix group for permissions for diagnostics
group = cli115


[inputdata]

# The base path to the inputdata directory
base_path = /lustre/orion/cli115/world-shared/e3sm/inputdata


# The parallel section describes options related to running jobs in parallel
[parallel]

# parallel system of execution: slurm, pbs or single_node
system = slurm

# account for running diagnostics jobs
account = cli115

# available partition(s) (default is the first)
partitions = batch

# whether to use mpirun or srun to run a task
parallel_executable = srun -l -K

# gpus per node on the machine
gpus_per_node = 8

# cpu cores per node
cores_per_node = 56

# the maximum number of MPI tasks per node
max_mpi_tasks_per_node = 8

# the maximum number of tasks per gpu
ntasks_per_gpu = 1

# CPU binding (cores or threads)
cpu_bind = cores

# placement type (plane, cyclic, block)
placement = plane

# gpu binding
gpu_bind = closest


# parallel options related to the craygnu compiler
[parallel.craygnu]

# no gpus per node
gpus_per_node = 0

# no gpu binding
gpu_bind =


# parallel options related to the craycray compiler
[parallel.craycray]

# no gpus per node
gpus_per_node = 0

# no gpu binding
gpu_bind =


# parallel options related to the crayamd compiler
[parallel.crayamd]

# no gpus per node
gpus_per_node = 0

# no gpu binding
gpu_bind =


# Config options related to spack environments
[spack]

# whether the machine uses cray compilers
cray_compilers = True


# config options related to synchronizing files
[sync]

# the full hostname of the machine
hostname = frontier.olcf.ornl.gov


# Options related to machine discovery
[discovery]

# a regular expression used to identify this machine from its hostname
hostname_re = ^frontier
