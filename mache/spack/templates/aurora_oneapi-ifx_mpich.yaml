{%- set compiler = "oneapi@2025.3.1" %}
{%- set mpi = "mpich@5.0.0" %}

spack:
  specs:
  # don't include {{ compiler }} since there isn't a "oneapi" package
  - {{ mpi }}%{{ compiler }}
  - "hdf5%{{ compiler }}"
  - "netcdf-c%{{ compiler }}"
  - "netcdf-fortran%{{ compiler }}"
  - "parallel-netcdf%{{ compiler }}"
{%- for spec in specs %}
  - "{{ spec }}%{{ compiler }}"
{%- endfor %}
  concretizer:
    unify: true
  packages:
    all:
      compiler: [{{ compiler }}, gcc@13.3.0]
      providers:
        mpi: [{{ mpi }}]
    bison:
      externals:
      - spec: bison@3.0.4
        prefix: /usr
      buildable: false
    bzip2:
      externals:
      - spec: bzip2@1.0.8
        prefix: /usr
      buildable: false
    cmake:
      externals:
      - spec: cmake@3.31.11
        prefix: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/cmake-3.31.11-pss2phi
      buildable: false
    curl:
      externals:
      - spec: curl@7.79.1
        prefix: /usr
      buildable: false
    diffutils:
      externals:
      - spec: diffutils@3.6
        prefix: /usr
      buildable: false
    findutils:
      externals:
      - spec: findutils@4.8.0
        prefix: /usr
      buildable: false
    gmake:
      externals:
      - spec: gmake@4.4.1
        prefix: /opt/aurora/25.190.0/spack/unified/0.10.1/install/linux-sles15-x86_64/gcc-13.3.0/gmake-4.4.1-wza7sk4
      buildable: false
    libxml2:
      externals:
      - spec: libxml2@2.13.5
        prefix: /opt/aurora/25.190.0/spack/unified/0.10.1/install/linux-sles15-x86_64/gcc-13.3.0/libxml2-2.13.5-dhzcbk4
      buildable: false
    openssl:
      externals:
      - spec: openssl@1.1.1l
        prefix: /usr
      buildable: false
    python:
      externals:
      - spec: python@3.10.14
        prefix: /opt/aurora/25.190.0/spack/unified/0.10.1/install/linux-sles15-x86_64/gcc-13.3.0/python-3.10.14-x4dd26d
      buildable: false
    re2c:
      externals:
      - spec: re2c@1.0.3
        prefix: /usr
      buildable: false
    xz:
      externals:
      - spec: xz@5.2.3
        prefix: /usr
      buildable: false
    zlib:
      externals:
      - spec: zlib@1.2.11
        prefix: /usr
      buildable: false
    perl:
      externals:
      - spec: perl@5.26.1
        prefix: /usr
      buildable: false

    oneapi:
      externals:
      - spec: {{ compiler }}
        modules:
        - oneapi/release/2025.3.1
        extra_attributes:
          compilers:
            c: /opt/aurora/26.26.0/oneapi/compiler/latest/bin/icx
            cxx: /opt/aurora/26.26.0/oneapi/compiler/latest/bin/icpx
            fortran: /opt/aurora/26.26.0/oneapi/compiler/latest/bin/ifx
      buildable: false
    gcc:
      externals:
      - spec: gcc@13.3.0
        modules:
        - gcc/13.3.0
      buildable: false
    gcc-runtime:
      externals:
      - spec: gcc-runtime@13.3.0%gcc@13.3.0
        prefix: /opt/aurora/25.190.0/spack/unified/0.10.1/install/linux-sles15-x86_64/gcc-13.3.0/gcc-runtime-13.3.0-ghotoln
      buildable: false
    mpich:
      externals:
      - spec: {{ mpi }}%{{ compiler }}
        prefix: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/mpich-5.0.0.aurora_test.3c70a61-hlkigtk
      buildable: false
    hdf5:
      externals:
      - spec: hdf5@1.14.6+cxx+fortran+hl+mpi
        prefix: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/hdf5-1.14.6-ehlefog
      buildable: false
    netcdf-c:
      externals:
      - spec: netcdf-c@4.9.3+mpi~parallel-netcdf
        prefix: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/netcdf-c-4.9.3-7nk2whw
      buildable: false
    netcdf-fortran:
      externals:
      - spec: netcdf-fortran@4.6.2
        prefix: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/netcdf-fortran-4.6.2-2eygqoe
      buildable: false
    parallel-netcdf:
      externals:
      - spec: parallel-netcdf@1.14.1+cxx+fortran
        prefix: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/parallel-netcdf-1.14.1-44pgfig
      buildable: false
  compilers:
  - compiler:
      spec: {{ compiler }}
      paths:
        cc: /opt/aurora/26.26.0/oneapi/compiler/latest/bin/icx
        cxx: /opt/aurora/26.26.0/oneapi/compiler/latest/bin/icpx
        f77: /opt/aurora/26.26.0/oneapi/compiler/latest/bin/ifx
        fc: /opt/aurora/26.26.0/oneapi/compiler/latest/bin/ifx
      flags: {}
      operating_system: sles15
      target: x86_64
      modules: []
      environment: {}
      extra_rpaths: []
  - compiler:
      spec: gcc@13.3.0
      paths:
        cc:  /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/gcc-13.4.0-hgnyg4p/bin/gcc
        cxx: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/gcc-13.4.0-hgnyg4p/bin/g++
        f77: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/gcc-13.4.0-hgnyg4p/bin/gfortran
        fc: /opt/aurora/26.26.0/spack/unified/1.1.1/install/linux-x86_64/gcc-13.4.0-hgnyg4p/bin/gfortran
      operating_system: sles15
      target: x86_64
      modules: [gcc/13.3.0]
      flags: {}
      environment: {}
      extra_rpaths: []
