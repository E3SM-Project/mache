{%- set compiler = "oneapi@2025.2.0" %}
{%- set mpi = "openmpi@4.1.8" %}
spack:
  specs:
  - {{ compiler }}
  - {{ mpi }}%{{ compiler }}
{%- if e3sm_lapack %}
  - intel-oneapi-mkl
{%- endif %}
{%- if e3sm_hdf5_netcdf %}
  - "hdf5%{{ compiler }}"
  - "netcdf-c%{{ compiler }}"
  - "netcdf-fortran%{{ compiler }}"
  - "parallel-netcdf%{{ compiler }}"
{%- endif %}
{%- for spec in specs %}
  - "{{ spec }}%{{ compiler }}"
{%- endfor %}
  concretizer:
    unify: true
  packages:
    all:
      compiler: [{{ compiler }}]
      providers:
        mpi: [{{ mpi }}%{{ compiler }}]
{%- if e3sm_lapack %}
        lapack: [intel-oneapi-mkl@2025.2.0]
{%- endif %}
    bison:
      externals:
      - spec: bison@3.0.4
        prefix: /usr
      buildable: false
    bzip2:
      externals:
      - spec: bzip2@1.0.8
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/intel-20.0.4/bzip2-1.0.8-6n3r43w
      buildable: false
    cmake:
      externals:
      - spec: cmake@3.24.2
        prefix: /gpfs/fs1/soft/chrysalis/spack-latest/opt/spack/linux-rhel8-x86_64/gcc-11.3.0/cmake-3.24.2-whgdv7y
      buildable: false
    curl:
      externals:
      - spec: curl@7.72.0
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/intel-20.0.4/curl-7.72.0-vn7k6yr
      buildable: false
    diffutils:
      externals:
      - spec: diffutils@3.7
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/intel-20.0.4/diffutils-3.7-bml5fc4
      buildable: false
    findutils:
      externals:
      - spec: findutils@4.6.0
        prefix: /usr
      buildable: false
    gmake:
      externals:
      - spec: gmake@4.2.1
        prefix: /usr
      buildable: false
    libiconv:
      externals:
      - spec: libiconv@1.16
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/intel-20.0.4/libiconv-1.16-hthrnaq
      buildable: false
    libxml2:
      externals:
      - spec: libxml2@2.9.10
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/intel-20.0.4/libxml2-2.9.10-gav4atu
      buildable: false
    openssl:
      externals:
      - spec: openssl@1.1.1c
        prefix: /usr
      buildable: false
    xz:
      externals:
      - spec: xz@5.2.5
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/intel-20.0.4/xz-5.2.5-xajm2b3
      buildable: false
    zlib:
      externals:
      - spec: zlib@1.2.11
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/intel-20.0.4/zlib-1.2.11-dudhhig
      buildable: false
    perl:
      externals:
      - spec: perl@5.32.0
        prefix: /gpfs/fs1/soft/chrysalis/spack/opt/spack/linux-centos8-x86_64/gcc-9.3.0/perl-5.32.0-bsnc6lt
        modules:
          - perl/5.32.0-bsnc6lt
      buildable: false
    oneapi:
      externals:
      - spec: {{ compiler }}
        modules:
        - intel-oneapi-compilers/2025.2.0-mdlxe55
        extra_attributes:
          compilers:
            c: icx
            cxx: icpx
            fortran: ifx
      buildable: false
    openmpi:
      externals:
      - spec: {{ mpi }}%{{ compiler }}
        modules:
        - openmpi/4.1.8-nygtpa3
      buildable: false
    intel-oneapi-mkl:
      externals:
      - spec: intel-oneapi-mkl@2025.2.0
        modules:
        - intel-oneapi-mkl/2025.2.0-bcimxay
      buildable: false
{%- if e3sm_hdf5_netcdf %}
    hdf5:
      externals:
      - spec: hdf5@1.14.6+cxx+fortran+hl+mpi
        modules:
        - hdf5/1.14.6-5cgownf
      buildable: false
    netcdf-c:
      externals:
      - spec: netcdf-c@4.9.3+mpi~parallel-netcdf
        modules:
        - netcdf-c/4.9.3-mekqsor
      buildable: false
    netcdf-fortran:
      externals:
      - spec: netcdf-fortran@4.6.2
        modules:
        - netcdf-fortran/4.6.2-cjqpiwp
      buildable: false
    parallel-netcdf:
      externals:
      - spec: parallel-netcdf@1.14.1+cxx+fortran
        modules:
        - parallel-netcdf/1.14.1-f2fwvr2
      buildable: false
{%- endif %}
  compilers:
  - compiler:
      spec: {{ compiler }}
      paths:
        cc: /gpfs/fs1/soft/chrysalis/spack-latest/opt/spack/linux-rhel8-x86_64/none-none/intel-oneapi-compilers-2025.2.0-f3alqc4/compiler/2025.2/bin/icx
        cxx: /gpfs/fs1/soft/chrysalis/spack-latest/opt/spack/linux-rhel8-x86_64/none-none/intel-oneapi-compilers-2025.2.0-f3alqc4/compiler/2025.2/bin/icpx
        f77: /gpfs/fs1/soft/chrysalis/spack-latest/opt/spack/linux-rhel8-x86_64/none-none/intel-oneapi-compilers-2025.2.0-f3alqc4/compiler/2025.2/bin/ifx
        fc: /gpfs/fs1/soft/chrysalis/spack-latest/opt/spack/linux-rhel8-x86_64/none-none/intel-oneapi-compilers-2025.2.0-f3alqc4/compiler/2025.2/bin/ifx
      flags: {}
      operating_system: rhel8
      target: x86_64
      modules: []
      environment: {}
      extra_rpaths: []
